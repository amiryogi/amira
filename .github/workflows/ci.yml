name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───── Shared Setup ─────
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - uses: actions/cache@v4
        id: modules-cache
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

  # ───── TypeScript & Lint ─────
  typecheck-lint:
    name: TypeScript & Lint
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
      - name: Build shared package
        run: pnpm build:shared
      - name: TypeScript check
        run: pnpm typecheck
      - name: ESLint
        run: pnpm lint

  # ───── Backend Tests ─────
  test-api:
    name: Backend Tests
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
      - name: Build shared package
        run: pnpm build:shared
      - name: Run backend tests with coverage
        run: pnpm --filter @amira/api test:coverage
        env:
          NODE_ENV: test
      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-api
          path: packages/api/coverage/
          retention-days: 7

  # ───── Web Tests ─────
  test-web:
    name: Web Tests
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
      - name: Build shared package
        run: pnpm build:shared
      - name: Run web tests with coverage
        run: pnpm --filter @amira/web test:coverage
      - name: Upload web coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-web
          path: apps/web/coverage/
          retention-days: 7

  # ───── Admin Tests ─────
  test-admin:
    name: Admin Tests
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
      - name: Build shared package
        run: pnpm build:shared
      - name: Run admin tests with coverage
        run: pnpm --filter @amira/admin test:coverage
      - name: Upload admin coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-admin
          path: apps/admin/coverage/
          retention-days: 7

  # ───── Mobile Tests ─────
  test-mobile:
    name: Mobile Tests
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
      - name: Build shared package
        run: pnpm build:shared
      - name: Run mobile tests
        run: pnpm --filter @amira/mobile test -- --coverage --ci
      - name: Upload mobile coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-mobile
          path: apps/mobile/coverage/
          retention-days: 7

  # ───── Build Check ─────
  build:
    name: Build All
    needs: [typecheck-lint, test-api, test-web, test-admin, test-mobile]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: modules-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
      - name: Build all packages
        run: pnpm build
